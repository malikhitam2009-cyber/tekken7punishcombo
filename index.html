        function formatTekkenButtons(text) {
            return text.replace(/[1234]/g, function(match) {
                return `<span class="tk-btn tk-${match}">${match}</span>`;
            });
        }

        function createNav() {
            const nav = document.getElementById('charNav');
            characters.forEach((char, i) => {
                const btn = document.createElement('button');
                btn.className = `char-btn ${i===0 ? 'active' : ''}`;
                btn.textContent = char.name;
                btn.onclick = () => showChar(i);
                nav.appendChild(btn);
            });
        }

        function showChar(index) {
            const char = characters[index];
            const content = document.getElementById('mainContent');
            
            let html = `
                <div class="char-info">
                    <img src="${char.image}" alt="${char.name}">
                    <h2>${char.name}</h2>
                    <div class="char-desc">${char.description}</div>
                </div>
                <div>
                    <h2 style="color:#ffd700;">PRO PUNISH COMBOS</h2>
            `;

            char.combos.forEach(c => {
                html += `
                    <div class="combo-card">
                        <h3>${c.name} <span class="damage">${c.damage}</span></h3>
                        <div class="notation-flow">
                `;

                c.steps.forEach((step, stepIndex) => {
                    const formattedStep = formatTekkenButtons(step);
                    html += `<div class="step-box">${formattedStep}</div>`;
                    
                    if (stepIndex < c.steps.length - 1) {
                        html += `<div class="step-arrow">➔</div>`;
                    }
                });

                html += `
                        </div>
                        <small style="color: #aaa;">${c.note}</small>
                    </div>
                `;
            });

            html += `</div>`;
            content.innerHTML = html;

            document.querySelectorAll('.char-btn').forEach((b,i) => b.classList.toggle('active', i===index));
        }

        window.onload = () => {
            createNav();
            showChar(0);
        };
    </script>
